<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" width="1200" height="760">
  <defs>    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, sans-serif; font-size: 22px; font-weight: 700; fill: #111827; }
      .subtitle { font-family: -apple-system, sans-serif; font-size: 13px; fill: #6b7280; }
      .h1 { font-family: -apple-system, sans-serif; font-size: 16px; font-weight: 700; fill: #111827; }
      .h2 { font-family: -apple-system, sans-serif; font-size: 14px; font-weight: 600; fill: #111827; }
      .h3 { font-family: -apple-system, sans-serif; font-size: 13px; font-weight: 600; fill: #374151; }
      .body { font-family: -apple-system, sans-serif; font-size: 12px; fill: #374151; }
      .body-mono { font-family: "SF Mono", Monaco, monospace; font-size: 12px; fill: #1f2937; }
      .note { font-family: -apple-system, sans-serif; font-size: 11px; fill: #6b7280; font-style: italic; }
      .strike { font-family: -apple-system, sans-serif; font-size: 12px; fill: #9ca3af; text-decoration: line-through; }
      .badge { font-family: -apple-system, sans-serif; font-size: 11px; font-weight: 600; fill: #ffffff; }
      .layer-title { font-family: -apple-system, sans-serif; font-size: 16px; font-weight: 600; fill: #111827; }
      .layer-note { font-family: -apple-system, sans-serif; font-size: 12px; fill: #6b7280; font-style: italic; }
      .os-label { font-family: -apple-system, sans-serif; font-size: 13px; font-weight: 600; fill: #4b5563; letter-spacing: 0.5px; }
      .path { font-family: "SF Mono", Monaco, monospace; font-size: 13px; fill: #1f2937; }
      .path-faded { font-family: "SF Mono", Monaco, monospace; font-size: 13px; fill: #6b7280; }
      .annot { font-family: -apple-system, sans-serif; font-size: 11px; fill: #6b7280; }
      .footer-title { font-family: -apple-system, sans-serif; font-size: 14px; font-weight: 600; fill: #111827; }
      .footer-text { font-family: -apple-system, sans-serif; font-size: 12px; fill: #374151; }
    </style></defs>
  <rect width="1200" height="760" fill="#ffffff"/>
  <text x="60" y="44" class="title">Current 角色架构</text>
  <text x="60" y="66" class="subtitle">cast 内多 role 的边界与归属 — 经过 step 1/2/3 重审后的简化</text>
  <line x1="60" y1="92" x2="1140" y2="92" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="60" y="120" width="700" height="540" rx="8" fill="#fefce8" stroke="#ca8a04" stroke-width="2"/>
  <text x="80" y="148" class="h1">cast skill (Current 唯一 skill)</text>
  <text x="80" y="168" class="note">极纯化 = 桥 + 安全网 + 极简导览员/体验层</text>
  <rect x="80" y="192" width="660" height="200" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <rect x="80" y="192" width="80" height="22" rx="3" fill="#2563eb"/>
  <text x="88" y="208" class="badge">桥 (核心)</text>
  <text x="95" y="237" class="h3">功能 — 必须 work,永远不挡路</text>
  <text x="95" y="260" class="body">• git operations (pull / push / status / commit)</text>
  <text x="95" y="278" class="body">• GitLab API 封装 (project / member / topic / etc)</text>
  <text x="95" y="296" class="body">• stream identity 管理 (slug ↔ remote URL ↔ local path)</text>
  <text x="95" y="314" class="body">• reconcile (path 失效时按 remote URL 反查找回)</text>
  <text x="95" y="332" class="body">• auth (PAT 管理)</text>
  <text x="95" y="362" class="h3">4 条不变量:</text>
  <text x="110" y="382" class="note">• identity 锚云端</text>
  <text x="275" y="382" class="note">• path 跟用户</text>
  <text x="440" y="382" class="note">• reconcile 容错 (git remote URL 是真相)</text>
  <text x="605" y="382" class="note">• 零摩擦 (用户挪文件不需先告诉)</text>
  <rect x="80" y="408" width="660" height="80" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <rect x="80" y="408" width="120" height="22" rx="3" fill="#ea580c"/>
  <text x="88" y="424" class="badge">协作机制安全网</text>
  <text x="95" y="453" class="h3">功能性约束 — 保护信息不丢</text>
  <text x="95" y="473" class="body">• stream notify 行为规则 (先落文档再 notify, 否则空消息会丢失内容)</text>
  <rect x="80" y="504" width="660" height="70" rx="6" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <rect x="80" y="504" width="100" height="22" rx="3" fill="#6b7280"/>
  <text x="88" y="520" class="badge">极简导览员</text>
  <text x="95" y="549" class="body">三类沉淀引导 / 术语解释 — 全部下沉到 reference/, 按需加载, 不主动</text>
  <rect x="80" y="590" width="660" height="50" rx="6" fill="#fafafa" stroke="#d1d5db" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="95" y="612" class="h3">体验层</text>
  <text x="95" y="630" class="body">greeting / welcome 渲染 — AI 按场景调用 cast 子命令, 不在 SKILL.md 主流程</text>
  <text x="800" y="128" class="h2">不在 cast 内 (各归各家)</text>
  <rect x="800" y="150" width="340" height="200" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="815" y="174" class="h2">thinking-partner</text>
  <text x="815" y="194" class="note">独立 plugin, 1.0 → 2.0 时拆出去</text>
  <text x="815" y="222" class="body">• 激发式对话工具</text>
  <text x="815" y="244" class="body">• "不给答案, 给问题"</text>
  <text x="815" y="266" class="body">• 一次一个问题</text>
  <text x="815" y="288" class="body">• 用户的话说话</text>
  <text x="815" y="325" class="h3" fill="#059669">→ 推荐用户搭配安装</text>
  <rect x="800" y="370" width="340" height="210" rx="6" fill="#fdf4ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="815" y="394" class="h2">vault 完整 me</text>
  <text x="815" y="414" class="note">Obsidian 00 Me ⚓/ — liushu 主导写</text>
  <text x="815" y="442" class="body">• mission.md / values.md</text>
  <text x="815" y="464" class="body">• my-lessons/ (反思日志, 四段式)</text>
  <text x="815" y="486" class="body">• who-am-i.md (元信息)</text>
  <text x="815" y="508" class="body">• Journal / Garden 等</text>
  <text x="815" y="545" class="h3" fill="#a855f7">→ 私密反思工具, 不是 AI 写 AI 读</text>
  <text x="800" y="600" class="h3" fill="#9ca3af">已砍掉的 role:</text>
  <text x="800" y="622" class="strike">~~current-onboard~~ → cast SKILL.md 极简 trigger</text>
  <text x="800" y="642" class="strike">~~current-coach~~ → 内容散到 cast / docs / 砍掉</text>
  <text x="800" y="662" class="strike">~~current-reflect~~ → my-lessons 写入暂留 cast</text>
  <line x1="60" y1="710" x2="1140" y2="710" stroke="#e5e7eb" stroke-width="1"/>
  <text x="60" y="732" class="note">核心思路: 显性化 cast 内的 role 边界 — 桥永远不挡路, 导览员永远是建议; 多 role 揉一起是复杂性根源</text>
</svg>