<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560">
<style>text{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei','Helvetica Neue',Arial,sans-serif}</style>
<defs>
<marker id="ac" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><polygon points="0 0, 9 4, 0 8" fill="#5a5a5a"/></marker>
<filter id="sh" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#0000001a"/></filter>
</defs>
<rect width="1000" height="560" fill="#f8f6f3"/>
<text x="500" y="44" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">状态住哪：没有中心 DB，按"谁是权威"分三层</text>
<rect x="80" y="120" width="760" height="96" rx="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
<text x="108" y="160" font-size="17" font-weight="700" fill="#1a1a1a">知识面</text>
<text x="108" y="186" font-size="13" fill="#5a5a5a">设计 / why / 决策叙事</text>
<line x1="470" y1="138" x2="470" y2="198" stroke="#4a4a4a" stroke-width="1.2" stroke-dasharray="3,3"/>
<text x="496" y="174" font-size="14" font-weight="600" fill="#1a1a1a">权威 = 人（文档系统）</text>
<rect x="80" y="250" width="760" height="96" rx="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
<text x="108" y="290" font-size="17" font-weight="700" fill="#1a1a1a">work-state</text>
<text x="108" y="316" font-size="13" fill="#5a5a5a">任务到哪了 / 球在谁手里</text>
<line x1="470" y1="268" x2="470" y2="328" stroke="#4a4a4a" stroke-width="1.2" stroke-dasharray="3,3"/>
<text x="496" y="304" font-size="14" font-weight="600" fill="#1a1a1a">权威 = 任务看板 · 单一写入者（只控制塔写）</text>
<rect x="80" y="380" width="760" height="96" rx="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.5" filter="url(#sh)"/>
<text x="108" y="420" font-size="17" font-weight="700" fill="#1a1a1a">orchestrator claim</text>
<text x="108" y="446" font-size="13" fill="#5a5a5a">哪个 run 正活着</text>
<line x1="470" y1="398" x2="470" y2="458" stroke="#4a4a4a" stroke-width="1.2" stroke-dasharray="3,3"/>
<text x="496" y="434" font-size="14" font-weight="600" fill="#1a1a1a">权威 = daemon 的 runtime journal / WAL</text>
<rect x="80" y="500" width="760" height="40" rx="10" fill="none" stroke="#4a4a4a" stroke-width="1.5" stroke-dasharray="6,4"/>
<text x="460" y="525" text-anchor="middle" font-size="13" fill="#5a5a5a">"没有持久 DB" ≠ "没有 log"：该持久的有 WAL 兜底；短命的（一次 claim）随用随弃</text>
