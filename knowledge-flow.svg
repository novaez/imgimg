<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="960" height="560" fill="#ffffff"/>

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" fill="#111827" font-size="18" font-weight="500">知识流动</text>

  <!-- Layer labels -->
  <text x="100" y="80" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="500" letter-spacing="0.08em">输入</text>
  <text x="310" y="80" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="500" letter-spacing="0.08em">捕获</text>
  <text x="540" y="80" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="500" letter-spacing="0.08em">积累</text>
  <text x="800" y="80" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="500" letter-spacing="0.08em">创作</text>
  <!-- Row 1: 外部素材 flow -->
  <rect x="30" y="110" width="140" height="48" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="100" y="139" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">外部素材</text>
  <rect x="240" y="110" width="140" height="48" rx="4" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1"/>
  <text x="310" y="133" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">Inbox 📥</text>
  <text x="310" y="149" text-anchor="middle" fill="#9ca3af" font-size="11">原料池</text>
  <rect x="430" y="118" width="90" height="32" rx="16" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="475" y="139" text-anchor="middle" fill="#6b7280" font-size="12" font-weight="500">/compile</text>
  <rect x="570" y="110" width="140" height="48" rx="4" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="640" y="133" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">Wiki 📖</text>
  <text x="640" y="149" text-anchor="middle" fill="#9ca3af" font-size="11">别人的知识</text>
  <line x1="170" y1="134" x2="238" y2="134" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="380" y1="134" x2="428" y2="134" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="520" y1="134" x2="568" y2="134" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- Row 2: 日常碎片 flow -->
  <rect x="30" y="230" width="140" height="48" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="100" y="259" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">日常碎片</text>
  <rect x="240" y="230" width="140" height="48" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="310" y="253" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">Journal 📓</text>
  <text x="310" y="269" text-anchor="middle" fill="#9ca3af" font-size="11">时间线</text>
  <line x1="170" y1="254" x2="238" y2="254" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- Row 3: 手工整理 flow -->
  <rect x="30" y="350" width="140" height="48" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="100" y="379" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">手工整理</text>
  <rect x="240" y="350" width="140" height="48" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="310" y="373" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">Garden 🌱</text>
  <text x="310" y="389" text-anchor="middle" fill="#9ca3af" font-size="11">自己的洞察</text>
  <line x1="170" y1="374" x2="238" y2="374" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- Projects / Areas -->
  <rect x="730" y="218" width="180" height="80" rx="4" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="820" y="250" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">Projects 🎯</text>
  <text x="820" y="270" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">Areas 🔄</text>
  <text x="820" y="290" text-anchor="middle" fill="#9ca3af" font-size="11">创作输出</text>
  <!-- Converging arrows -->
  <path d="M 710,134 Q 760,134 760,220 L 760,256" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <line x1="380" y1="254" x2="728" y2="258" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M 380,374 Q 760,374 760,300 L 760,298" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <!-- Feedback loop -->
  <path d="M 820,298 L 820,480 Q 820,500 800,500 L 310,500 Q 290,500 290,480 L 290,400" stroke="#9ca3af" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow-gray)"/>
  <rect x="450" y="490" width="180" height="22" rx="4" fill="#ffffff" opacity="0.95"/>
  <text x="540" y="505" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="500">项目完成后提炼新洞察</text>
  <!-- Legend -->
  <line x1="30" y1="535" x2="60" y2="535" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="68" y="539" fill="#6b7280" font-size="11">知识流动</text>
  <line x1="140" y1="535" x2="170" y2="535" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-gray)"/>
  <text x="178" y="539" fill="#6b7280" font-size="11">回流</text>
</svg>