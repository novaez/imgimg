<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" width="1200" height="740">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#9ca3af"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d97706"/>
    </marker>
  </defs>
  <rect width="1200" height="740" fill="#ffffff"/>

  <text x="600" y="38" text-anchor="middle" fill="#111827" font-size="20" font-weight="500">知识流动</text>

  <!-- me anchor card -->
  <rect x="20" y="50" width="260" height="120" rx="6" fill="#fef3c7" stroke="#fcd34d" stroke-width="1.5"/>
  <text x="150" y="85" text-anchor="middle" fill="#111827" font-size="18" font-weight="600">me ⚓</text>
  <text x="150" y="112" text-anchor="middle" fill="#374151" font-size="13">使命 · 身份 · 信念 · 能力</text>
  <text x="150" y="138" text-anchor="middle" fill="#9ca3af" font-size="11">Obsidian 里的锚点</text>

  <!-- cast / Ahoy card -->
  <rect x="900" y="60" width="260" height="100" rx="6" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="1030" y="90" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">Current 体系</text>
  <text x="1030" y="118" text-anchor="middle" fill="#111827" font-size="16" font-weight="600">cast · Ahoy!</text>
  <text x="1030" y="142" text-anchor="middle" fill="#9ca3af" font-size="11">读 me + 团队 + 项目</text>

  <!-- me to cast/Ahoy -->
  <line x1="282" y1="110" x2="898" y2="110" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <rect x="555" y="98" width="70" height="20" rx="3" fill="#ffffff"/>
  <text x="590" y="113" text-anchor="middle" fill="#6b7280" font-size="12">被读取</text>

  <!-- Layer labels -->
  <text x="130" y="200" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="500" letter-spacing="0.08em">输入</text>
  <text x="350" y="200" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="500" letter-spacing="0.08em">捕获</text>
  <text x="620" y="200" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="500" letter-spacing="0.08em">积累</text>
  <text x="1030" y="200" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="500" letter-spacing="0.08em">创作</text>
  <line x1="60" y1="215" x2="200" y2="215" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="280" y1="215" x2="420" y2="215" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="480" y1="215" x2="760" y2="215" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="930" y1="215" x2="1130" y2="215" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Row 1 -->
  <rect x="60" y="250" width="140" height="48" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="130" y="279" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">外部素材</text>
  <rect x="280" y="250" width="140" height="48" rx="4" fill="#f0f9ff" stroke="#bae6fd" stroke-width="1"/>
  <text x="350" y="273" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">Inbox 📥</text>
  <text x="350" y="289" text-anchor="middle" fill="#9ca3af" font-size="11">原料池</text>
  <rect x="480" y="258" width="90" height="32" rx="16" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="525" y="279" text-anchor="middle" fill="#6b7280" font-size="12" font-weight="500">/compile</text>
  <rect x="620" y="250" width="140" height="48" rx="4" fill="#fefce8" stroke="#fde68a" stroke-width="1"/>
  <text x="690" y="273" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">Wiki 📖</text>
  <text x="690" y="289" text-anchor="middle" fill="#9ca3af" font-size="11">别人的知识</text>
  <line x1="200" y1="274" x2="278" y2="274" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="420" y1="274" x2="478" y2="274" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <line x1="570" y1="274" x2="618" y2="274" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Row 2 -->
  <rect x="60" y="370" width="140" height="48" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="130" y="399" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">日常碎片</text>
  <rect x="280" y="370" width="140" height="48" rx="4" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
  <text x="350" y="393" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">Journal 📓</text>
  <text x="350" y="409" text-anchor="middle" fill="#9ca3af" font-size="11">时间线</text>
  <line x1="200" y1="394" x2="278" y2="394" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Row 3 -->
  <rect x="60" y="490" width="140" height="48" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="130" y="519" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">手工整理</text>
  <rect x="280" y="490" width="140" height="48" rx="4" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="350" y="513" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">Garden 🌱</text>
  <text x="350" y="529" text-anchor="middle" fill="#9ca3af" font-size="11">自己的洞察</text>
  <line x1="200" y1="514" x2="278" y2="514" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Projects / Areas -->
  <rect x="930" y="370" width="200" height="100" rx="6" fill="#faf5ff" stroke="#d8b4fe" stroke-width="1"/>
  <text x="1030" y="402" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">Projects 🎯</text>
  <text x="1030" y="425" text-anchor="middle" fill="#111827" font-size="14" font-weight="500">Areas 🔄</text>
  <text x="1030" y="450" text-anchor="middle" fill="#9ca3af" font-size="11">创作输出</text>

  <!-- Converging arrows to Projects/Areas -->
  <path d="M 760,274 C 860,274 860,395 928,395" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>
  <line x1="420" y1="394" x2="928" y2="420" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <path d="M 420,514 C 860,514 860,445 928,445" stroke="#3b82f6" stroke-width="1.5" fill="none" marker-end="url(#arrow-blue)"/>

  <!-- Feedback loop -->
  <path d="M 1030,470 L 1030,660 L 350,660 L 350,540" stroke="#9ca3af" stroke-width="1.5" fill="none" stroke-dasharray="6,3" marker-end="url(#arrow-gray)"/>
  <rect x="595" y="650" width="190" height="20" rx="3" fill="#ffffff"/>
  <text x="690" y="664" text-anchor="middle" fill="#6b7280" font-size="11">项目完成后提炼的新洞察</text>

  <!-- me and Garden bidirectional -->
  <path d="M 240,170 L 240,475 L 290,475 L 290,490" stroke="#d97706" stroke-width="1.5" fill="none" marker-end="url(#arrow-amber)"/>
  <path d="M 310,490 L 310,485 L 260,485 L 260,170" stroke="#d97706" stroke-width="1.5" fill="none" marker-end="url(#arrow-amber)"/>
  <rect x="192" y="328" width="40" height="20" rx="3" fill="#ffffff"/>
  <text x="212" y="342" text-anchor="middle" fill="#d97706" font-size="12">提炼</text>
  <rect x="288" y="328" width="40" height="20" rx="3" fill="#ffffff"/>
  <text x="308" y="342" text-anchor="middle" fill="#d97706" font-size="12">生长</text>

  <!-- Journal to my-lessons (self-layer refinement) -->
  <path d="M 350,370 C 500,320 500,220 260,170" stroke="#d97706" stroke-width="1.5" fill="none" marker-end="url(#arrow-amber)"/>
  <rect x="410" y="302" width="130" height="20" rx="3" fill="#ffffff"/>
  <text x="475" y="316" text-anchor="middle" fill="#d97706" font-size="11">反思 → my-lessons</text>

  <!-- Legend -->
  <line x1="30" y1="705" x2="60" y2="705" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="68" y="709" fill="#6b7280" font-size="11">知识流动</text>
  <line x1="170" y1="705" x2="200" y2="705" stroke="#d97706" stroke-width="1.5" marker-end="url(#arrow-amber)"/>
  <text x="208" y="709" fill="#6b7280" font-size="11">自我提炼（Journal → my-lessons / me ↔ Garden）</text>
  <line x1="590" y1="705" x2="620" y2="705" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-gray)"/>
  <text x="628" y="709" fill="#6b7280" font-size="11">回流</text>
</svg>